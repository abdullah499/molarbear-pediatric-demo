<script type="text/babel">
  function Page() {
    const onBook = () => { window.location.href = "Contact.html"; };
    const sections = [
      {
        h: "Why we keep this notice",
        body: [
          "Federal law requires us to maintain the privacy of your child\u2019s protected health information (PHI), tell you about our legal duties and privacy practices around PHI, and follow the terms of the notice that is in effect.",
          "This notice applies to all medical records of our patients generated by Molar Bear Pediatric Dental, P.C.",
        ],
      },
      {
        h: "Uses and disclosures we make",
        body: [
          "We use and disclose PHI for these standard purposes without needing your separate written authorization:",
          [
            "Treatment \u2014 sharing information with other providers involved in your child\u2019s care (e.g., orthodontist referral).",
            "Payment \u2014 billing insurance, processing claims, verifying eligibility.",
            "Health care operations \u2014 quality review, staff training, scheduling, audits.",
            "Appointment reminders \u2014 SMS, voice, or email reminders using the contact info you give us.",
            "Public health and safety \u2014 reporting communicable diseases, suspected abuse, or as required by law.",
            "Business associates \u2014 vetted vendors (scheduling software, secure messaging, billing) bound by written agreements.",
          ],
        ],
      },
      {
        h: "Uses that require your authorization",
        body: [
          "We will obtain your written authorization before:",
          [
            "Using PHI for marketing purposes outside our normal communications.",
            "Selling PHI (we don\u2019t do this).",
            "Using or sharing psychotherapy notes (not typical in dental care).",
          ],
          "You may revoke an authorization at any time in writing.",
        ],
      },
      {
        h: "Your rights as a patient or guardian",
        body: [
          [
            "Inspect and copy. You may request a copy of your child\u2019s record. We respond within 30 days.",
            "Amend. You may request a correction to your child\u2019s record if you believe something is wrong.",
            "Accounting of disclosures. You may request a list of disclosures we have made outside of treatment, payment, and operations.",
            "Restrict uses. You may request limits on how we use or share PHI. We will try to honor reasonable requests.",
            "Confidential communications. You may ask us to contact you in a specific way (e.g., only at a certain phone number).",
            "Paper copy. You may request a paper copy of this notice at any time.",
            "File a complaint. You may file a complaint with our Privacy Officer or with the U.S. Department of Health and Human Services. We will not retaliate.",
          ],
        ],
      },
      {
        h: "Breach notification",
        body: [
          "If there is ever a breach of unsecured PHI involving your child, we will notify you in writing within 60 days as required by the HITECH Act.",
        ],
      },
      {
        h: "Changes to this notice",
        body: [
          "We may change this notice from time to time. The revised notice will apply to all PHI we maintain. The current notice is always available at the front desk and on this page.",
        ],
